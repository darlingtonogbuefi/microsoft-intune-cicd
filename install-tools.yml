- name: Configure Windows VM - Install PowerShell, Python, CLI tools
  hosts: windows
  gather_facts: no
  tasks:

    - name: Ensure Chocolatey is installed
      win_chocolatey:
        name: chocolatey
        state: present

    - name: Install PowerShell 7 if not already installed
      win_shell: |
        if (-not (Test-Path "C:\Program Files\PowerShell\7\pwsh.exe")) {
          choco install powershell -y
        }

    - name: Add PowerShell 7 to system PATH if not present
      win_shell: |
        $path = [Environment]::GetEnvironmentVariable('Path', 'Machine')
        if ($path -notlike '*C:\Program Files\PowerShell\7*') {
          $newPath = "C:\Program Files\PowerShell\7;" + $path
          [Environment]::SetEnvironmentVariable('Path', $newPath, 'Machine')
        }

    - name: Verify PowerShell 7 is on the path
      win_shell: |
        if (-not (Get-Command pwsh.exe -ErrorAction SilentlyContinue)) {
          Write-Error "pwsh.exe not found in PATH"
        }

    - name: Install Pester if not already installed or outdated
      win_shell: |
        $installed = Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version -ge [Version]'5.0.0' }
        if (-not $installed) {
          Install-Module -Name Pester -Force -SkipPublisherCheck -AllowClobber -Scope AllUsers
        }

    - name: Create PowerShell 7 desktop shortcut
      win_shortcut:
        path: "{{ ansible_env.PUBLIC }}\\Desktop\\PowerShell 7.lnk"
        target: "C:\\Program Files\\PowerShell\\7\\pwsh.exe"
        description: "PowerShell 7 Desktop Shortcut"
        icon: "C:\\Program Files\\PowerShell\\7\\pwsh.exe"

    - name: Install Python if not present
      win_shell: |
        if (-not (Get-Command python.exe -ErrorAction SilentlyContinue)) {
          choco install python -y
        }

    - name: Upgrade pip and install common packages
      win_shell: |
        if (Get-Command python.exe -ErrorAction SilentlyContinue) {
          python -m ensurepip --upgrade
          python -m pip install --upgrade pip virtualenv requests setuptools wheel
        }

    - name: Install Azure CLI if not present
      win_shell: |
        if (-not (Get-Command az -ErrorAction SilentlyContinue)) {
          choco install azure-cli -y
        }

    - name: Install Az.Accounts module if not present
      win_shell: |
        if (-not (Get-Module -ListAvailable -Name Az.Accounts)) {
          Install-Module -Name Az.Accounts -Force -AllowClobber -Scope AllUsers
        }

    - name: Install Microsoft.Graph modules if not present
      win_shell: |
        foreach ($module in @("Microsoft.Graph.Authentication", "Microsoft.Graph.DeviceManagement.Administration")) {
          if (-not (Get-Module -ListAvailable -Name $module)) {
            Install-Module -Name $module -Force -AllowClobber -Scope AllUsers
          }
        }
