- name: Configure Windows VM - PowerShell, Python & Tools
  hosts: windows
  gather_facts: no
  tasks:

    - name: Ensure Chocolatey is installed
      win_chocolatey:
        name: chocolatey
        state: present

    - name: Install PowerShell 7 via Chocolatey
      win_chocolatey:
        name: powershell
        state: present

    - name: Verify PowerShell 7 installation
      win_shell: |
        $pwshPath = "C:\Program Files\PowerShell\7\pwsh.exe"
        if (-not (Test-Path $pwshPath)) {
          Write-Error "PowerShell 7 was not installed correctly."
        }

    - name: Set PowerShell 7 as the default shell in registry
      win_shell: |
        $pwshPath = "C:\Program Files\PowerShell\7\pwsh.exe"
        if (Test-Path $pwshPath) {
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon" -Name "Shell" -Value $pwshPath
        }
      ignore_errors: true

    - name: Remove old versions of Pester (< 5.0.0)
      win_shell: |
        $old = Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version -lt [Version]'5.0.0' }
        if ($old) {
          $old | ForEach-Object { Uninstall-Module -Name $_.Name -RequiredVersion $_.Version -Force }
        }

    - name: Install latest Pester (>= 5.0.0)
      win_shell: |
        if (-not (Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version -ge [Version]'5.0.0' })) {
          Install-Module -Name Pester -Force -SkipPublisherCheck -AllowClobber -Scope AllUsers
        }

    - name: Install Python via Chocolatey
      win_chocolatey:
        name: python
        state: present

    - name: Ensure Python is added to system PATH
      win_environment:
        name: Path
        state: present
        level: machine
        value: C:\Python39\Scripts\;C:\Python39\

    - name: Upgrade pip to the latest version
      win_shell: |
        python -m ensurepip --upgrade
        python -m pip install --upgrade pip

    - name: Install common pip packages
      win_shell: |
        python -m pip install virtualenv requests setuptools wheel

    - name: Install Azure CLI via Chocolatey
      win_chocolatey:
        name: azure-cli
        state: present

    - name: Install and Import Az.Accounts module if not present
      win_shell: |
        if (-not (Get-Module -ListAvailable -Name Az.Accounts)) {
          Install-Module -Name Az.Accounts -Force -AllowClobber -Scope AllUsers
        }
        if (-not (Get-Module -Name Az.Accounts)) {
          Import-Module Az.Accounts
        }

    - name: Install and Import Microsoft.Graph modules if not present
      win_shell: |
        foreach ($module in @("Microsoft.Graph.Authentication", "Microsoft.Graph.DeviceManagement.Administration")) {
          if (-not (Get-Module -ListAvailable -Name $module)) {
            Install-Module -Name $module -Force -AllowClobber -Scope AllUsers
          }
          if (-not (Get-Module -Name $module)) {
            Import-Module $module
          }
        }

    - name: Create PowerShell 7 desktop shortcut
      win_shortcut:
        path: "{{ ansible_env.PUBLIC }}\\Desktop\\PowerShell 7.lnk"
        target: "C:\\Program Files\\PowerShell\\7\\pwsh.exe"
        description: "PowerShell 7 Desktop Shortcut"
        icon: "C:\\Program Files\\PowerShell\\7\\pwsh.exe"

    - name: Create Pester desktop shortcut (opens PowerShell 7)
      win_shortcut:
        path: "{{ ansible_env.PUBLIC }}\\Desktop\\Pester.lnk"
        target: "C:\\Program Files\\PowerShell\\7\\pwsh.exe"
        arguments: "-NoExit -Command Import-Module Pester"
        description: "PowerShell with Pester loaded"
        icon: "C:\\Program Files\\PowerShell\\7\\pwsh.exe"
