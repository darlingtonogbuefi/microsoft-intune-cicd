trigger:
  branches:
    include:
      - main

variables:
- group: KeyVault-Secrets
- group: notifications
- group: targetgroupid        # <-- Includes TargetGroupId variable group
- name: SCRIPT_FOLDER
  value: 'intune-scripts'
- name: TEST_FOLDER
  value: 'pester-tests'
- name: TEST_RESULTS
  value: 'Test-Pester.xml'

pool:
  name: Default

stages:

# Discover Script and Test Paths
- stage: DiscoverFiles
  displayName: Discover Script & Test Files
  jobs:
  - template: templates/discover-files.yml

# Run Pester Tests
- stage: PesterTests
  displayName: Run Pester Tests
  dependsOn: DiscoverFiles
  variables:
    TEST_PATHS: $[ stageDependencies.DiscoverFiles.DiscoverFiles.outputs['SetVars.TEST_PATHS'] ]
  jobs:
  - template: templates/test-pester.yml

# Run PSScriptAnalyzer
- stage: PSScriptAnalyzer
  displayName: Run PSScriptAnalyzer
  dependsOn: DiscoverFiles
  variables:
    SCRIPT_PATHS: $[ stageDependencies.DiscoverFiles.DiscoverFiles.outputs['SetVars.SCRIPT_PATHS'] ]
  jobs:
  - template: templates/lint-psscriptanalyzer.yml

# Deploy to Intune
- stage: DeployToIntune
  displayName: Deploy Scripts to Intune
  dependsOn:
    - PesterTests
    - PSScriptAnalyzer
  condition: and(succeeded('PesterTests'), succeeded('PSScriptAnalyzer'))
  jobs:
  - template: templates/deploy-intune.yml

   # ✅ CHANGED: Added Copy & Publish Artifact Job
  - job: PublishScriptAssignments
    displayName: Publish ScriptAssignments Artifact
    dependsOn: []
    pool:
      name: Default
    steps:
      - task: CopyFiles@2                 # ✅ CHANGED
        displayName: 'Copy to staging'    # ✅ CHANGED
        inputs:
          SourceFolder: '$(Build.SourcesDirectory)/intune-scripts'  # ✅ Ensure JSON source here
          Contents: 'script-assignments.json'
          TargetFolder: '$(Build.ArtifactStagingDirectory)/ScriptAssignments'

      - publish: '$(Build.ArtifactStagingDirectory)/ScriptAssignments'
        artifact: ScriptAssignments

# Assign Policies Stage
- stage: AssignPolicies
  displayName: Assign Scripts to Intune Device Group
  dependsOn: DeployToIntune
  condition: succeeded('DeployToIntune')
  jobs:

    - job: ParseAssignments
      displayName: Parse Script Assignments JSON
      pool:
        name: Default
      steps:
        - download: current
          artifact: ScriptAssignments

        - task: PowerShell@2
          name: SetAssignments
          displayName: Parse and set script assignments output variable
          inputs:
            targetType: 'inline'
            pwsh: true
            script: |
              $jsonPath = "$(Pipeline.Workspace)/ScriptAssignments/script-assignments.json"
              Write-Host "Reading script assignments from $jsonPath"

              # 🔒 ADDED SAFETY: Check file exists
              if (-Not (Test-Path $jsonPath)) {
                  Write-Error "File not found: $jsonPath"
                  exit 1
              }

              $jsonRaw = Get-Content -Raw -Path $jsonPath
              Write-Host "Raw JSON: $jsonRaw"

              try {
                  $json = $jsonRaw | ConvertFrom-Json
                  $jsonText = $json | ConvertTo-Json -Depth 5 -Compress
                  Write-Host "##vso[task.setvariable variable=ScriptAssignmentsJson;isOutput=true]$jsonText"
              } catch {
                  Write-Error "Failed to parse JSON: $_"
                  exit 1
              }

    - template: templates/assign-policy.yml
      parameters:
        tenantId: $(TenantId)
        clientId: $(ClientId)
        clientSecret: $(clientsecret4053)
        targetGroupId: $(TargetGroupId)
        scriptAssignments: $[ dependencies.ParseAssignments.outputs['SetAssignments.ScriptAssignmentsJson'] ]  # ✅ Confirm output reference
# Notify Slack
- stage: NotifySlack
  displayName: Notify Slack
  dependsOn: DeployToIntune
  condition: always()
  jobs:
  - template: templates/notify-slack.yml
