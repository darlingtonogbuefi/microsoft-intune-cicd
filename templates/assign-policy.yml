# templates/assign-policy.yml
parameters: {}

jobs:
- job: AssignPolicy
  pool:
    name: Default
  steps:
    - checkout: self

    - task: DownloadPipelineArtifact@2
      displayName: 'Download ScriptAssignments artifact'
      inputs:
        artifact: ScriptAssignments
        path: $(Pipeline.Workspace)/ScriptAssignments

    - task: PowerShell@2
      displayName: 'Assign each script to group'
      inputs:
        targetType: 'inline'
        pwsh: true
        script: |
          $ErrorActionPreference = 'Stop'

          $filePath = "$(Pipeline.Workspace)/ScriptAssignments/script-assignments.json"
          if (-not (Test-Path $filePath)) {
            Write-Error "Assignment file not found: $filePath"
            exit 1
          }

          $assignments = Get-Content -Raw -Path $filePath | ConvertFrom-Json

          $tenantId = "$(TenantId)"
          $clientId = "$(ClientId)"
          $clientSecret = "$(clientsecret4053)"

          if (-not (Get-Module -ListAvailable -Name Microsoft.Graph)) {
              Install-Module Microsoft.Graph -Force -Scope CurrentUser -AllowClobber
          }
          Import-Module Microsoft.Graph

          Connect-MgGraph -ClientId $clientId -TenantId $tenantId -ClientSecret $clientSecret -Scopes "DeviceManagementConfiguration.ReadWrite.All"

          foreach ($item in $assignments) {
            Write-Host "Assigning Script ID: $($item.scriptId) to Group ID: $($item.targetGroupId)"

            $body = @{
              deviceManagementScriptAssignments = @(
                @{
                  target = @{
                    groupId = $item.targetGroupId
                  }
                }
              )
            }

            Invoke-MgGraphRequest -Method POST `
              -Uri "https://graph.microsoft.com/beta/deviceManagement/deviceManagementScripts/$($item.scriptId)/assign" `
              -Body ($body | ConvertTo-Json -Depth 5) `
              -ContentType "application/json"
          }
