parameters:
  - name: tenantId
    type: string
  - name: clientId
    type: string
  - name: clientSecret
    type: string
  - name: targetGroupId
    type: string
  - name: scriptIds
    type: string  # comma-separated string of script IDs

jobs:
- job: AssignScripts
  pool:
    name: Default
  steps:
    - task: PowerShell@2
      displayName: 'Assign scripts to Intune group'
      inputs:
        targetType: 'inline'
        pwsh: true
        script: |
          # Initialize parameters
          $tenantId = '${{ parameters.tenantId }}'
          $clientId = '${{ parameters.clientId }}'
          $clientSecret = '${{ parameters.clientSecret }}'
          $groupId = '${{ parameters.targetGroupId }}'
          $scriptIdsRaw = '${{ parameters.scriptIds }}'
          $scriptIds = $scriptIdsRaw -split ','

          # ✅ Final Debug Tip
          Write-Host "DEBUG: scriptIds = $scriptIdsRaw"
          Write-Host "DEBUG: targetGroupId = $groupId"

          # Validation
          if ([string]::IsNullOrWhiteSpace($tenantId) -or
              [string]::IsNullOrWhiteSpace($clientId) -or
              [string]::IsNullOrWhiteSpace($clientSecret) -or
              [string]::IsNullOrWhiteSpace($groupId) -or
              [string]::IsNullOrWhiteSpace($scriptIdsRaw)) {
              Write-Error "❌ One or more required parameters are missing or empty."
              exit 1
          }

          # Install & import modules
          if (-not (Get-Module -ListAvailable -Name Az.Accounts)) {
              Install-Module Az.Accounts -Force -Scope CurrentUser -AllowClobber
          }
          Import-Module Az.Accounts

          if (-not (Get-Module -ListAvailable -Name Microsoft.Graph)) {
              Install-Module Microsoft.Graph -Force -Scope CurrentUser -AllowClobber
          }
          Import-Module Microsoft.Graph

          # Auth
          $secureSecret = ConvertTo-SecureString $clientSecret -AsPlainText -Force
          $cred = New-Object System.Management.Automation.PSCredential ($clientId, $secureSecret)

          Connect-AzAccount -ServicePrincipal -TenantId $tenantId -Credential $cred
          $token = (Get-AzAccessToken -TenantId $tenantId -ResourceUrl "https://graph.microsoft.com").Token
          Connect-MgGraph -AccessToken $token

          # Assign scripts to group
          foreach ($scriptId in $scriptIds) {
              $scriptIdTrimmed = $scriptId.Trim()
              if ([string]::IsNullOrWhiteSpace($scriptIdTrimmed)) { continue }

              $uri = "https://graph.microsoft.com/beta/deviceManagement/deviceManagementScripts/$scriptIdTrimmed/assign"

              $body = @{
                  assignments = @(
                      @{
                          '@odata.type' = '#microsoft.graph.deviceManagementScriptGroupAssignment'
                          target = @{
                              '@odata.type' = '#microsoft.graph.groupAssignmentTarget'
                              groupId = $groupId
                          }
                      }
                  )
              } | ConvertTo-Json -Depth 5

              Write-Host "📦 Assigning script ID: $scriptIdTrimmed to group: $groupId"
              Invoke-MgGraphRequest -Method POST -Uri $uri -Body $body -ContentType "application/json"
          }
