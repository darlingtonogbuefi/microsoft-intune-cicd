# /templates/assign-policy.yml
parameters:
  tenantId: ''
  clientId: ''
  clientSecret: ''
  scriptAssignments: ''

jobs:
- job: AssignIntuneScripts
  displayName: Assign Scripts to Intune Group
  pool:
    name: Default
  steps:
    - checkout: self

    - task: PowerShell@2
      displayName: 'Assign each script to device group'
      inputs:
        targetType: 'inline'
        pwsh: true
        script: |
          $ErrorActionPreference = "Stop"

          $tenantId = "${{ parameters.tenantId }}"
          $clientId = "${{ parameters.clientId }}"
          $clientSecret = "${{ parameters.clientSecret }}"
          $assignmentsJson = '${{ parameters.scriptAssignments }}'  # ← escaped string
          $assignments = $assignmentsJson | ConvertFrom-Json

          if (-not (Get-Module -ListAvailable -Name Microsoft.Graph)) {
              Install-Module Microsoft.Graph -Force -Scope CurrentUser -AllowClobber
          }
          Import-Module Microsoft.Graph

          Connect-MgGraph -ClientId $clientId -TenantId $tenantId -ClientSecret $clientSecret -Scopes "DeviceManagementConfiguration.ReadWrite.All"

          foreach ($assignment in $assignments) {
              $scriptId = $assignment.scriptId
              $groupId = $assignment.targetGroupId

              Write-Host "Assigning Script $scriptId to Group $groupId..."

              $payload = @{
                  deviceManagementScriptAssignments = @(
                      @{
                          target = @{
                              groupId = $groupId
                          }
                      }
                  )
              }

              Invoke-MgGraphRequest -Method POST `
                -Uri "https://graph.microsoft.com/beta/deviceManagement/deviceManagementScripts/$scriptId/assign" `
                -Body ($payload | ConvertTo-Json -Depth 5) `
                -ContentType "application/json"
          }
