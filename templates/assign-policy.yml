parameters:
  tenantId: ''
  clientId: ''
  clientSecret: ''
  targetGroupId: ''
  scriptAssignments: ''

jobs:
- job: AssignIntuneScripts
  displayName: Assign Scripts to Intune Group
  pool:
    name: Default
  steps:
    - checkout: self

    - task: PowerShell@2
      displayName: 'Assign each script to device group'
      env:
        TENANT_ID: ${{ parameters.tenantId }}
        CLIENT_ID: ${{ parameters.clientId }}
        CLIENT_SECRET: ${{ parameters.clientSecret }}
        TARGET_GROUP_ID: ${{ parameters.targetGroupId }}
        SCRIPT_ASSIGNMENTS_JSON: '${{ parameters.scriptAssignments }}'  # <--- ADD this line
      inputs:
        targetType: 'inline'
        pwsh: true
        script: |
          $ErrorActionPreference = "Stop"

          $tenantId = $env:TENANT_ID
          $clientId = $env:CLIENT_ID
          $clientSecret = $env:CLIENT_SECRET
          $passedGroupId = $env:TARGET_GROUP_ID

          # 🔽 DECODE base64-encoded JSON string
          $encodedJson = $env:SCRIPT_ASSIGNMENTS_JSON.Trim('"')
          try {
            $decodedJson = [System.Text.Encoding]::UTF8.GetString(
              [System.Convert]::FromBase64String($encodedJson)
            )
          } catch {
            Write-Error "Failed to decode base64 scriptAssignments: $_"
            exit 1
          }

          # 🔽 Parse the decoded JSON into PowerShell objects
          try {
            $assignments = $decodedJson | ConvertFrom-Json
          } catch {
            Write-Error "Failed to parse JSON from decoded scriptAssignments: $_"
            exit 1
          }

          # 🔽 Ensure Graph module
          if (-not (Get-Module -ListAvailable -Name Microsoft.Graph)) {
              Install-Module Microsoft.Graph -Force -Scope CurrentUser -AllowClobber
          }
          Import-Module Microsoft.Graph

          # 🔽 Auth & connect
          $secureSecret = ConvertTo-SecureString $clientSecret -AsPlainText -Force
          $cred = New-Object System.Management.Automation.PSCredential ($clientId, $secureSecret)

          Connect-AzAccount -ServicePrincipal -TenantId $tenantId -Credential $cred
          $token = (Get-AzAccessToken -TenantId $tenantId -ResourceUrl "https://graph.microsoft.com").Token
          Connect-MgGraph -AccessToken $token

          # 🔽 Assign scripts
          foreach ($assignment in $assignments) {
              $scriptId = $assignment.scriptId
              $groupId = if ($assignment.PSObject.Properties.Name -contains 'targetGroupId') {
                  $assignment.targetGroupId
              } else {
                  $passedGroupId
              }

              Write-Host "Assigning Script $scriptId to Group $groupId..."

              $payload = @{
                  deviceManagementScriptGroupAssignments = @(
                      @{
                          targetGroupId = $groupId
                      }
                  )
              }

              Invoke-MgGraphRequest -Method POST `
                -Uri "https://graph.microsoft.com/beta/deviceManagement/deviceManagementScripts/$scriptId/assign" `
                -Body ($payload | ConvertTo-Json -Depth 5) `
                -ContentType "application/json"
          }
