# /templates/deploy-intune.yml
parameters: {}

jobs:
- job: DeployIntune
  pool:
    name: Default
  steps:
    - checkout: self

    - task: PowerShell@2
      name: DeployScripts
      displayName: 'Deploy Scripts to Intune (if all tests passed)'
      inputs:
        targetType: 'inline'
        pwsh: true
        script: |
          $ErrorActionPreference = "Stop"

          $scriptFolder = "$(System.DefaultWorkingDirectory)/$(SCRIPT_FOLDER)"
          $scriptFiles = Get-ChildItem -Path $scriptFolder -Filter '*.ps1' -File | Where-Object { $_.Name -notlike '*Tests.ps1' }

          if (-not $scriptFiles) {
            Write-Error "No scripts found to deploy."
            exit 1
          }

          $tenantId = "$(TenantId)"
          $clientId = "$(ClientId)"
          $clientSecret = "$(clientsecret4053)"
          $targetGroupId = "$(TargetGroupId)"

          if (-not (Get-Module -ListAvailable -Name Microsoft.Graph)) {
              Install-Module Microsoft.Graph -Force -Scope CurrentUser -AllowClobber
          }
          Import-Module Microsoft.Graph

          Connect-MgGraph -ClientId $clientId -TenantId $tenantId -ClientSecret $clientSecret -Scopes "DeviceManagementConfiguration.ReadWrite.All"

          $assignments = @()

          foreach ($script in $scriptFiles) {
            $scriptContent = Get-Content -Raw -Path $script.FullName
            $encodedScript = [Convert]::ToBase64String([Text.Encoding]::Unicode.GetBytes($scriptContent))

            $body = @{
              displayName           = [System.IO.Path]::GetFileNameWithoutExtension($script.FullName)
              description           = "Deployed via Azure DevOps pipeline"
              scriptContent         = $encodedScript
              runFrequency          = "once"
              enforceSignatureCheck = $false
              runAs32Bit            = $true
            }

            $response = Invoke-MgGraphRequest -Method POST `
              -Uri "https://graph.microsoft.com/beta/deviceManagement/deviceManagementScripts" `
              -Body ($body | ConvertTo-Json -Depth 5) `
              -ContentType "application/json"

            $assignments += @{
              scriptId = $response.id
              targetGroupId = $targetGroupId
            }

            Write-Host "Deployed $($script.Name) with ID $($response.id)"
          }

          # Save assignments to file
          $assignmentsJson = $assignments | ConvertTo-Json -Depth 5
          $outDir = "$(Pipeline.Workspace)/ScriptAssignments"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          $outPath = Join-Path $outDir "script-assignments.json"
          $assignmentsJson | Out-File -Encoding utf8 -FilePath $outPath

    - task: PublishPipelineArtifact@1
      displayName: 'Publish ScriptAssignments'
      inputs:
        targetPath: '$(Pipeline.Workspace)/ScriptAssignments'
        artifact: ScriptAssignments
