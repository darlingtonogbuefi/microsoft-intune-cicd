trigger:
  branches:
    include:
      - main

variables:
- group: KeyVault-Secrets
- name: SCRIPT_FOLDER
  value: 'intune-scripts'
- name: TEST_FOLDER
  value: 'pester-tests'
- name: TEST_RESULTS
  value: 'Test-Pester.xml'

stages:
- stage: __default
  jobs:
  - job: Job
    pool:
      name: Default
    steps:
    - checkout: self

    - task: PowerShell@2
      displayName: 'Import Microsoft.PowerShell.Security Module'
      inputs:
        targetType: 'inline'
        pwsh: true
        arguments: '-NoProfile -NonInteractive'
        script: |
          try {
            Import-Module Microsoft.PowerShell.Security -ErrorAction Stop
            Write-Host "Microsoft.PowerShell.Security imported successfully."
          } catch {
            Write-Warning "Failed to import Microsoft.PowerShell.Security: $_"
          }

    - task: PowerShell@2
      displayName: 'Check PowerShell Version'
      inputs:
        targetType: 'inline'
        pwsh: true
        arguments: '-NoProfile -NonInteractive'
        script: |
          Write-Host "PowerShell version: $($PSVersionTable.PSVersion)"

    - task: PowerShell@2
      displayName: 'List Files in Working Directory'
      inputs:
        targetType: 'inline'
        pwsh: true
        arguments: '-NoProfile -NonInteractive'
        script: |
          Write-Host "Listing all files in $(System.DefaultWorkingDirectory):"
          Get-ChildItem -Path "$(System.DefaultWorkingDirectory)" -Recurse

    - task: PowerShell@2
      displayName: 'Find All Script and Test Files Dynamically'
      inputs:
        targetType: 'inline'
        pwsh: true
        script: |
          $scriptFolder = "$(System.DefaultWorkingDirectory)/$(SCRIPT_FOLDER)"
          $testFolder = "$(System.DefaultWorkingDirectory)/$(TEST_FOLDER)"

          $scriptFiles = Get-ChildItem -Path $scriptFolder -Filter '*.ps1' -File | Where-Object { $_.Name -notlike '*Tests.ps1' }
          $testFiles = Get-ChildItem -Path $testFolder -Filter '*.Tests.ps1' -File

          if (-not $scriptFiles) {
            Write-Error "No .ps1 scripts found in folder $scriptFolder"
            exit 1
          }
          if (-not $testFiles) {
            Write-Error "No *Tests.ps1 found in folder $testFolder"
            exit 1
          }

          $scriptPaths = ($scriptFiles | ForEach-Object { $_.FullName }) -join ";"
          $testPaths = ($testFiles | ForEach-Object { $_.FullName }) -join ";"

          Write-Host "##vso[task.setvariable variable=SCRIPT_PATHS]$scriptPaths"
          Write-Host "##vso[task.setvariable variable=TEST_PATHS]$testPaths"

          Write-Host "Found scripts:"
          $scriptFiles | ForEach-Object { Write-Host $_.FullName }
          Write-Host "Found test files:"
          $testFiles | ForEach-Object { Write-Host $_.FullName }

    - task: PowerShell@2
      displayName: 'Install Latest Pester Module'
      inputs:
        targetType: 'inline'
        pwsh: true
        arguments: '-NoProfile -NonInteractive'
        script: |
          if (-not (Get-PackageProvider -Name NuGet -ErrorAction SilentlyContinue)) {
            Install-PackageProvider -Name NuGet -Force -Scope CurrentUser
          }
          $repo = Get-PSRepository -Name 'PSGallery'
          if ($repo.InstallationPolicy -ne 'Trusted') {
            Set-PSRepository -Name 'PSGallery' -InstallationPolicy Trusted
          }
          Get-InstalledModule -Name Pester -AllVersions -ErrorAction SilentlyContinue | ForEach-Object {
            Uninstall-Module -Name $_.Name -RequiredVersion $_.Version -Force -ErrorAction SilentlyContinue
          }
          Install-Module -Name Pester -Force -Scope CurrentUser -AllowClobber -SkipPublisherCheck

    - task: PowerShell@2
      displayName: 'Run Pester Tests on All Test Files'
      inputs:
        targetType: 'inline'
        pwsh: true
        arguments: '-NoProfile -NonInteractive'
        script: |
          Import-Module Pester

          $testPaths = "$(TEST_PATHS)" -split ';'
          $failedTests = $false
          $pesterResultsPath = "$(System.DefaultWorkingDirectory)/$(TEST_RESULTS)"

          $allResults = @()
          foreach ($testFile in $testPaths) {
            Write-Host "Running tests in $testFile"
            if (-Not (Test-Path -Path $testFile)) {
              Write-Warning "Test file not found: $testFile"
              continue
            }

            $testResult = Invoke-Pester -Path $testFile -PassThru -Verbose
            $allResults += $testResult

            if ($testResult.FailedCount -gt 0) {
              $failedTests = $true
            }
          }

          $allResults | Export-Clixml -Path $pesterResultsPath
          Write-Host "##vso[task.setvariable variable=TESTS_FAILED]$failedTests"

    - task: PublishPipelineArtifact@1
      displayName: 'Publish Pester Test Results'
      inputs:
        targetPath: '$(System.DefaultWorkingDirectory)/$(TEST_RESULTS)'
        artifactName: 'PesterTestResults'

    - task: PowerShell@2
      displayName: 'Run PSScriptAnalyzer and Save Report'
      inputs:
        targetType: 'inline'
        pwsh: true
        script: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -AllowClobber

          $scriptPaths = "$(SCRIPT_PATHS)" -split ';'
          $reportPath = "$(System.DefaultWorkingDirectory)/PSScriptAnalyzerResults.txt"
          $fail = $false

          # Clear previous report if exists
          if (Test-Path $reportPath) {
            Remove-Item $reportPath -Force
          }

          foreach ($script in $scriptPaths) {
            Write-Host "Analyzing $script"
            $results = Invoke-ScriptAnalyzer -Path $script -Recurse -Severity Warning,Error

            if ($results) {
              $errors = $results | Where-Object { $_.Severity -eq 'Error' }
              $warnings = $results | Where-Object { $_.Severity -eq 'Warning' }

              if ($errors) {
                $fail = $true
                "Errors found in ${script}:" | Out-File -Append -FilePath $reportPath
                $errors | Format-Table -AutoSize | Out-String | Out-File -Append -FilePath $reportPath
                Write-Warning "Errors found in ${script}"
              }

              if ($warnings) {
                "Warnings found in ${script}:" | Out-File -Append -FilePath $reportPath
                $warnings | Format-Table -AutoSize | Out-String | Out-File -Append -FilePath $reportPath
                Write-Host "Warnings found in ${script} (pipeline will not fail)"
              }
            } else {
              "No issues found in ${script}" | Out-File -Append -FilePath $reportPath
            }
          }

          Write-Host "##vso[task.setvariable variable=ANALYZER_FAILED]$fail"

          if ($fail) {
            Write-Error "❌ PSScriptAnalyzer found ERROR issues. See report."
            exit 1
          } else {
            Write-Host "✅ No ERROR issues found by PSScriptAnalyzer."
          }

    - task: PublishPipelineArtifact@1
      displayName: 'Publish PSScriptAnalyzer Report'
      inputs:
        targetPath: '$(System.DefaultWorkingDirectory)/PSScriptAnalyzerResults.txt'
        artifactName: 'PSScriptAnalyzerReport'

    - task: PowerShell@2
      displayName: 'Deploy Scripts to Intune (if all tests passed)'
      condition: and(succeeded(), eq(variables['TESTS_FAILED'], 'false'), eq(variables['ANALYZER_FAILED'], 'false'))
      inputs:
        targetType: 'inline'
        pwsh: true
        script: |
          $scriptPaths = "$(SCRIPT_PATHS)" -split ';'

          $tenantId = "$(TenantId)"
          $clientId = "$(ClientId)"
          $clientSecret = "$(clientsecret4053)"

          if (-not (Get-Module -ListAvailable -Name Az.Accounts)) {
            Install-Module Az.Accounts -Force -Scope CurrentUser -AllowClobber
          }
          if (-not (Get-Module -ListAvailable -Name Microsoft.Graph)) {
            Install-Module Microsoft.Graph -Force -Scope CurrentUser -AllowClobber
          }

          Import-Module Az.Accounts -Force
          Import-Module Microsoft.Graph -Force

          $secureSecret = ConvertTo-SecureString $clientSecret -AsPlainText -Force
          $cred = New-Object System.Management.Automation.PSCredential ($clientId, $secureSecret)

          Connect-AzAccount -ServicePrincipal -TenantId $tenantId -Credential $cred
          $token = (Get-AzAccessToken -TenantId $tenantId -ResourceUrl "https://graph.microsoft.com").Token
          Connect-MgGraph -AccessToken $token

          foreach ($scriptPath in $scriptPaths) {
            if (-not (Test-Path $scriptPath)) {
              Write-Warning "Script file not found, skipping: $scriptPath"
              continue
            }

            try {
              $scriptContent = Get-Content -Raw -Path $scriptPath
              $encodedScript = [Convert]::ToBase64String([Text.Encoding]::Unicode.GetBytes($scriptContent))

              $deviceManagementScript = @{
                displayName           = [System.IO.Path]::GetFileNameWithoutExtension($scriptPath)
                description           = "Deployed via Azure DevOps pipeline"
                scriptContent         = $encodedScript
                runFrequency          = "once"
                enforceSignatureCheck = $false
                runAs32Bit            = $true
              }

              Invoke-MgGraphRequest -Method POST `
                -Uri "https://graph.microsoft.com/beta/deviceManagement/deviceManagementScripts" `
                -Body ($deviceManagementScript | ConvertTo-Json -Depth 5) `
                -ContentType "application/json"

              Write-Host "✅ Successfully deployed script: $scriptPath"
            } catch {
              Write-Warning ("Failed to deploy script {0}: {1}" -f $scriptPath, $_)
            }
          }
